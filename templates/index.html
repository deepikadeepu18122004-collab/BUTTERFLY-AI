<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦋 Butterfly AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Background Blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <!-- Fireflies -->
    <div id="particles"></div>
    <!-- Butterflies -->
    <div class="butterfly butterfly1">🦋</div>
    <div class="butterfly butterfly2">🦋</div>
    <div class="butterfly butterfly3">🦋</div>
    <div class="butterfly butterfly4">🦋</div>
    <!-- Main Container -->
    <div class="chat-container">
        <!-- Header -->
        <div class="header">
            <h1>🦋 Butterfly AI</h1>
            <p>Your Calm & Intelligent Assistant</p>
            <div class="status">
                ● Online
            </div>
            <div id="modeIndicator">
                Current Mode: Normal
            </div>
        </div>
        <!-- Prompt Buttons -->
        <div class="prompt-bar">
            <button class="prompt-btn" onclick="setMode('coding')">
                💻 Coding
            </button>
            <button class="prompt-btn" onclick="setMode('study')">
                📚 Study
            </button>
            <button class="prompt-btn" onclick="setMode('interview')">
                🎯 Interview
            </button>
            <button class="prompt-btn" onclick="setMode('content')">
                ✍️ Content
            </button>
            <button class="prompt-btn" onclick="setMode('resume')">
                📝 Resume
            </button>
        </div>
        <!-- Chat Messages -->
        <div class="chat-box" id="chatBox">
            <div class="bot-message">
                🌿 Welcome to Butterfly AI. Select a mode and start chatting.
            </div>
        </div>
        <!-- Input -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Butterfly AI anything..." autocomplete="off"
                onkeypress="handleKey(event)">
            <button onclick="sendMessage()">
                Send ✨
            </button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
